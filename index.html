<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question for Ainon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe4e1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffe4e1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .card {
            background: white;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 85%;
            box-sizing: border-box;
        }
        .gif-wrapper {
            width: 100%;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }
        img {
            max-width: 160px;
            max-height: 160px;
            object-fit: contain;
        }
        h1, h2 {
            color: #d32f2f;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.7rem; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ffb6c1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            text-align: center;
        }
        .password-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .hint-box {
            background-color: #fff0f2;
            border-left: 4px solid #ff6b81;
            padding: 10px;
            border-radius: 6px;
            font-style: italic;
            color: #444;
            margin: 15px 0 5px 0;
            font-size: 0.95rem;
        }
        .error-msg {
            color: #d32f2f;
            font-size: 0.9rem;
            margin: 10px 0 0 0;
            font-weight: bold;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 25px;
            width: 100%;
            position: relative;
        }
        button {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-sizing: border-box;
        }
        #yesBtn { background-color: #4caf50; color: white; }
        #noBtn { background-color: #f44336; color: white; position: relative; }
        .secondary-btn { background-color: #f0f0f0; color: #333; }
        .reveal-btn {
            background: none; border: none; color: #757575;
            font-size: 0.85rem; text-decoration: underline;
            margin-top: 15px; padding: 5px; font-weight: normal;
        }
    </style>
</head>
<body>

    <!-- Password Screen Overlay -->
    <div id="passwordScreen" class="overlay">
        <div class="card">
            <h2>🔒 Access Restricted</h2>
            <p>Please enter the password to open this page:</p>
            <input type="text" id="passwordInput" placeholder="Who is this from?..." autocomplete="off">
            
            <div class="password-actions">
                <button id="loginBtn">Unlock 💖</button>
                <button id="hintBtn" class="secondary-btn">Get Hint 💡</button>
            </div>
            
            <p id="hintText" class="hint-box" style="display: none;"></p>
            <p id="loginError" class="error-msg"></p>
            <button id="revealBtn" class="reveal-btn" style="display: none;">Reveal Password 🤫</button>
        </div>
    </div>

    <!-- Main Proposal Card -->
    <div id="proposalScreen" class="card" style="display: none;">
        <div class="gif-wrapper">
            <img id="gif" src="https://media.tenor.com/w9v2g1vNlY8AAAAi/mochi-peach.gif" alt="Cute Proposal">
        </div>
        <h1 id="question">Will you marry me Ainon? 💍</h1>
        
        <div class="btn-container">
            <button id="yesBtn">YES! 💖</button>
            <button id="noBtn">No 😢</button>
        </div>
    </div>

    <!-- Interactive Script Embedded Directly -->
    <script>
        const ALLOWED_PASSWORDS = ["towfiqul", "towfiq", "towfik"]; 

        const HINTS = [
            "Your future husband 💍",
            "Your only lover ❤️",
            "Your future soulmate ✨",
            "Your roommate in Jannah 🏔️",
            "The one who codes websites just to ask you out 😉",
            "Think of a name... 7 letters, starts with T!"
        ];

        const STAGES = [
            {
                text: "did you click NO by mistake? 🤔",
                gif: "https://media.tenor.com/w9v2g1vNlY8AAAAi/mochi-peach.gif"
            },
            {
                text: "are you like sure sure?? 🥺",
                gif: "https://media.tenor.com/00Kk9zP-u34AAAAi/pepe-cry.gif"
            },
            {
                text: "please Ainon pookie? 🥺😭😭",
                gif: "https://media.tenor.com/Z4vU_p_M_EAAAAAi/sad-cat-holding-phone.gif"
            },
            {
                text: "if you say no I will be very sad 😢",
                gif: "https://media.tenor.com/beXf77p1v7QAAAAi/the-office-michael-scott.gif"
            },
            {
                text: "maybe read the question one last time? last chance...",
                gif: "https://media.tenor.com/b_86h6Hl788AAAAi/shocked-michael-scott.gif"
            }
        ];

        const passwordScreen = document.getElementById('passwordScreen');
        const proposalScreen = document.getElementById('proposalScreen');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const hintBtn = document.getElementById('hintBtn');
        const hintText = document.getElementById('hintText');
        const loginError = document.getElementById('loginError');
        const revealBtn = document.getElementById('revealBtn');

        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');
        const gif = document.getElementById('gif');

        let attemptCount = 0;
        let hintIndex = 0;
        let noCount = 0;

        loginBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        function checkPassword() {
            const userInput = passwordInput.value.trim().toLowerCase();
            
            if (ALLOWED_PASSWORDS.includes(userInput)) {
                passwordScreen.style.display = 'none';
                proposalScreen.style.display = 'block';
            } else {
                attemptCount++;
                loginError.innerText = "Incorrect answer! Try again or check the hints.";
                if (attemptCount >= 3) {
                    revealBtn.style.display = 'inline-block';
                }
            }
        }

        hintBtn.addEventListener('click', () => {
            hintText.style.display = 'block';
            hintText.innerText = `Hint: ${HINTS[hintIndex]}`;
            hintIndex = (hintIndex + 1) % HINTS.length;
        });

        revealBtn.addEventListener('click', () => {
            passwordInput.value = "Towfiqul";
            loginError.innerText = "Filled it out for you! Click Unlock 💖";
        });

        function handleNoProgress() {
            if (noCount < STAGES.length) {
                question.innerText = STAGES[noCount].text;
                gif.src = STAGES[noCount].gif;
                noCount++;
            } else {
                if (noBtn.style.position !== 'fixed') {
                    noBtn.style.position = 'fixed';
                }
                moveNoButton();
            }
        }

        function moveNoButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        noBtn.addEventListener('click', handleNoProgress);
        noBtn.addEventListener('mouseover', () => {
            if (noCount >= STAGES.length) moveNoButton();
        });
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (noCount >= STAGES.length) {
                moveNoButton();
            } else {
                handleNoProgress();
            }
        });

        yesBtn.addEventListener('click', () => {
            question.innerHTML = "YAYY! 🎉 I can't believe you said yes! I love you, Ainon! 🥂✨";
            gif.src = "https://media.tenor.com/26FLdmIp6wJr91JAI/giphy.gif"; 
            noBtn.style.display = 'none';
            yesBtn.style.transform = "scale(1.2)";
        });
    </script>
</body>
</html>
