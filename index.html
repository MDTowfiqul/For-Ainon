<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question for Ainon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe4e1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffe4e1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .card {
            background: white;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 85%;
            box-sizing: border-box;
            z-index: 2;
        }
        .gif-wrapper {
            width: 100%;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }
        img {
            max-width: 160px;
            max-height: 160px;
            object-fit: contain;
        }
        h1, h2 {
            color: #d32f2f;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.6rem; min-height: 60px; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ffb6c1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            text-align: center;
        }
        .password-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .hint-box {
            background-color: #fff0f2;
            border-left: 4px solid #ff6b81;
            padding: 10px;
            border-radius: 6px;
            font-style: italic;
            color: #444;
            margin: 15px 0 5px 0;
            font-size: 0.95rem;
        }
        .error-msg {
            color: #d32f2f;
            font-size: 0.9rem;
            margin: 10px 0 0 0;
            font-weight: bold;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 25px;
            width: 100%;
            position: relative;
        }
        button {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-sizing: border-box;
        }
        #yesBtn { background-color: #4caf50; color: white; transition: transform 0.2s; }
        #noBtn { background-color: #f44336; color: white; position: relative; z-index: 999; }
        .secondary-btn { background-color: #f0f0f0; color: #333; }
        .reveal-btn {
            background: none; border: none; color: #757575;
            font-size: 0.85rem; text-decoration: underline;
            margin-top: 15px; padding: 5px; font-weight: normal;
        }
    </style>
</head>
<body>

    <div id="passwordScreen" class="overlay">
        <div class="card">
            <h2>🔒 Access Restricted</h2>
            <p>Please enter the password to open this page:</p>
            <input type="text" id="passwordInput" placeholder="Who is this from?..." autocomplete="off">
            
            <div class="password-actions">
                <button id="loginBtn" onclick="checkPassword()">Unlock 💖</button>
                <button id="hintBtn" class="secondary-btn" onclick="showNextHint()">Get Hint 💡</button>
            </div>
            
            <p id="hintText" class="hint-box" style="display: none;"></p>
            <p id="loginError" class="error-msg"></p>
            <button id="revealBtn" class="reveal-btn" style="display: none;" onclick="revealPassword()">Reveal Password 🤫</button>
        </div>
    </div>

    <div id="proposalScreen" class="card" style="display: none;">
        <div class="gif-wrapper">
            <img id="gif" src="https://c.tenor.com/w9v2g1vNlY8AAAAC/mochi-peach.gif" alt="Cute Proposal">
        </div>
        <h1 id="question">Will you marry me Ainon? 💍</h1>
        
        <div class="btn-container">
            <button id="yesBtn" onclick="handleYesClick()">YES! 💖</button>
            <button id="noBtn" onclick="handleNoProgress()" onmouseover="handleNoHover()" ontouchstart="handleNoTouch(event)">No 😢</button>
        </div>
    </div>

    <script>
        const ALLOWED_PASSWORDS = ["towfiqul", "towfiq", "towfik"]; 

        const HINTS = [
            "Your future husband 💍",
            "Your only lover ❤️",
            "Your future soulmate ✨",
            "Your roommate in Jannah 🏔️",
            "The one who codes websites just to ask you out 😉",
            "Think of a name... 7 letters, starts with T!"
        ];

        // Using clean direct-path CDN URLs to force graphics engines to load them without errors
        const STAGES = [
            {
                text: "did you click NO by mistake? 🤔",
                gif: "https://c.tenor.com/w9v2g1vNlY8AAAAC/mochi-peach.gif"
            },
            {
                text: "are you like sure sure?? 🥺",
                gif: "https://c.tenor.com/00Kk9zP-u34AAAAC/pepe-cry.gif"
            },
            {
                text: "please Ainon pookie? 🥺😭😭",
                gif: "https://c.tenor.com/Z4vU_p_M_EAAAAAC/sad-cat-holding-phone.gif"
            },
            {
                text: "if you say no I will be very sad 😢",
                gif: "https://c.tenor.com/beXf77p1v7QAAAAC/the-office-michael-scott.gif"
            },
            {
                text: "maybe read the question one last time? last chance...",
                gif: "https://c.tenor.com/b_86h6Hl788AAAAC/shocked-michael-scott.gif"
            }
        ];

        // Fun dynamic text lines that will cycle infinitely while the button bounces around
        const FLOATING_TEXTS = [
            "Nice try! Still no! 😜",
            "Error 404: Rejection not found! ❌",
            "You can't escape this love! ❤️",
            "Click YES already! 👀",
            "Catch me if you can! 🏃‍♂️💨",
            "Still waiting for that YES... ⏳"
        ];

        let attemptCount = 0;
        let hintIndex = 0;
        let noCount = 0;
        let floatingTextIndex = 0;

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        function checkPassword() {
            const userInput = document.getElementById('passwordInput').value.trim().toLowerCase();
            if (ALLOWED_PASSWORDS.includes(userInput)) {
                document.getElementById('passwordScreen').style.display = 'none';
                document.getElementById('proposalScreen').style.display = 'block';
            } else {
                attemptCount++;
                document.getElementById('loginError').innerText = "Incorrect answer! Try again or check the hints.";
                if (attemptCount >= 3) {
                    document.getElementById('revealBtn').style.display = 'inline-block';
                }
            }
        }

        function showNextHint() {
            const hintText = document.getElementById('hintText');
            hintText.style.display = 'block';
            hintText.innerText = "Hint: " + HINTS[hintIndex];
            hintIndex = (hintIndex + 1) % HINTS.length;
        }

        function revealPassword() {
            document.getElementById('passwordInput').value = "Towfiqul";
            document.getElementById('loginError').innerText = "Filled it out for you! Click Unlock 💖";
        }

        function handleNoProgress() {
            const noBtn = document.getElementById('noBtn');
            const question = document.getElementById('question');
            const gif = document.getElementById('gif');

            if (noCount < STAGES.length) {
                question.innerText = STAGES[noCount].text;
                gif.src = STAGES[noCount].gif;
                noCount++;
            } else {
                // Loop dynamic floating text
                question.innerText = FLOATING_TEXTS[floatingTextIndex];
                floatingTextIndex = (floatingTextIndex + 1) % FLOATING_TEXTS.length;
                
                // Swap layout mode to floating absolute coordinates
                if (noBtn.style.position !== 'fixed') {
                    noBtn.style.position = 'fixed';
                }
                moveNoButton();
            }
        }

        function handleNoHover() {
            if (noCount >= STAGES.length) {
                moveNoButton();
            }
        }

        function handleNoTouch(e) {
            // Intercepts touch events on smartphones perfectly
            if (noCount >= STAGES.length) {
                e.preventDefault();
                // Cycle text on tap too
                document.getElementById('question').innerText = FLOATING_TEXTS[floatingTextIndex];
                floatingTextIndex = (floatingTextIndex + 1) % FLOATING_TEXTS.length;
                moveNoButton();
            }
        }

        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Constrain movement coordinates strictly inside the visible screen layout
            const padding = 40;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            const x = Math.max(padding, Math.floor(Math.random() * maxX));
            const y = Math.max(padding, Math.floor(Math.random() * maxY));
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function handleYesClick() {
            document.getElementById('question').innerHTML = "YAYY! 🎉 I can't believe you said yes! I love you, Ainon! 🥂✨";
            document.getElementById('gif').src = "https://c.tenor.com/26FLdmIp6wJr91JAI/giphy.gif"; 
            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('yesBtn').style.transform = "scale(1.2)";
        }
    </script>
</body>
</html>
