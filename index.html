<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question for Ainon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe4e1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffe4e1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .card {
            background: white;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 85%;
            box-sizing: border-box;
        }
        .gif-wrapper {
            width: 100%;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }
        img {
            max-width: 160px;
            max-height: 160px;
            object-fit: contain;
        }
        h1, h2 {
            color: #d32f2f;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.7rem; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ffb6c1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            text-align: center;
        }
        .password-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .hint-box {
            background-color: #fff0f2;
            border-left: 4px solid #ff6b81;
            padding: 10px;
            border-radius: 6px;
            font-style: italic;
            color: #444;
            margin: 15px 0 5px 0;
            font-size: 0.95rem;
        }
        .error-msg {
            color: #d32f2f;
            font-size: 0.9rem;
            margin: 10px 0 0 0;
            font-weight: bold;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 25px;
            width: 100%;
            position: relative;
        }
        button {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-sizing: border-box;
        }
        #yesBtn { background-color: #4caf50; color: white; }
        #noBtn { background-color: #f44336; color: white; position: relative; }
        .secondary-btn { background-color: #f0f0f0; color: #333; }
        .reveal-btn {
            background: none; border: none; color: #757575;
            font-size: 0.85rem; text-decoration: underline;
            margin-top: 15px; padding: 5px; font-weight: normal;
        }
    </style>
</head>
<body>

    <!-- Password Screen Overlay -->
    <div id="passwordScreen" class="overlay">
        <div class="card">
            <h2>🔒 Access Restricted</h2>
            <p>Please enter the password to open this page:</p>
            <input type="text" id="passwordInput" placeholder="Who is this from?..." autocomplete="off">
            
            <div class="password-actions">
                <button id="loginBtn">Unlock 💖</button>
                <button id="hintBtn" class="secondary-btn">Get Hint 💡</button>
            </div>
            
            <!-- Using hidden attribute so it cannot show prematurely -->
            <p id="hintText" class="hint-box" hidden></p>
            <p id="loginError" class="error-msg"></p>
            <button id="revealBtn" class="reveal-btn" hidden>Reveal Password 🤫</button>
        </div>
    </div>

    <!-- Main Proposal Card (Using standard HTML 'hidden' attribute to guarantee privacy) -->
    <div id="proposalScreen" class="card" hidden>
        <div class="gif-wrapper">
            <img id="gif" src="https://media.tenor.com/w9v2g1vNlY8AAAAi/mochi-peach.gif" alt="Cute Proposal">
        </div>
        <h1 id="question">Will you marry me Ainon? 💍</h1>
        
        <div class="btn-container">
            <button id="yesBtn">YES! 💖</button>
            <button id="noBtn">No 😢</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
